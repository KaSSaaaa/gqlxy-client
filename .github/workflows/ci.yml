name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: x64-linux-debug
            triplet: x64-linux
          - os: ubuntu-latest
            preset: x64-linux-release
            triplet: x64-linux
          - os: windows-latest
            preset: x64-windows-debug
            triplet: x64-windows
          - os: windows-latest
            preset: x64-windows-release
            triplet: x64-windows
          - os: macos-latest
            preset: arm64-osx-debug
            triplet: arm64-osx
          - os: macos-latest
            preset: arm64-osx-release
            triplet: arm64-osx

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC 14 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y g++-14 gcc-14 ninja-build cmake
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Install gcovr
        if: matrix.preset == 'x64-linux-debug'
        run: pip install gcovr

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg --depth=1
          git -C /tmp/vcpkg fetch --depth=1 origin e5a1490e1409d175932ef6014519e9ae149ddb7c
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV
          echo "/tmp/vcpkg" >> $GITHUB_PATH

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg-fresh --depth=1
          git -C C:\vcpkg-fresh fetch --depth=1 origin e5a1490e1409d175932ef6014519e9ae149ddb7c
          C:\vcpkg-fresh\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg-fresh" >> $env:GITHUB_ENV
          echo "C:\vcpkg-fresh" >> $env:GITHUB_PATH

      - name: Cache vcpkg packages (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.triplet }}-

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.triplet }}-

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build out/build/${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir out/build/${{ matrix.preset }} --output-on-failure

      - name: Generate coverage report
        if: matrix.preset == 'x64-linux-debug'
        run: cmake --build out/build/${{ matrix.preset }} --target coverage

      - name: Upload coverage report
        if: matrix.preset == 'x64-linux-debug'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
