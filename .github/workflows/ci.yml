name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: x64-linux-debug
            triplet: x64-linux
          - os: ubuntu-latest
            preset: x64-linux-release
            triplet: x64-linux
          - os: windows-latest
            preset: x64-windows-debug
            triplet: x64-windows
          - os: windows-latest
            preset: x64-windows-release
            triplet: x64-windows
          - os: macos-latest
            preset: arm64-osx-debug
            triplet: arm64-osx
          - os: macos-latest
            preset: arm64-osx-release
            triplet: arm64-osx

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC 14 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y g++-14 gcc-14 ninja-build cmake
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Install gcovr
        if: matrix.preset == 'x64-linux-debug'
        run: pip install gcovr

      - name: Set VCPKG_ROOT
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
            echo "$VCPKG_INSTALLATION_ROOT" >> $GITHUB_PATH
          else
            git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg --depth=1
            /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
            echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV
            echo "/tmp/vcpkg" >> $GITHUB_PATH
          fi

      - name: Set VCPKG_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Enable vcpkg binary caching (GHA)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set VCPKG_BINARY_SOURCES
        shell: bash
        run: echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build out/build/${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir out/build/${{ matrix.preset }} --output-on-failure

      - name: Generate coverage report
        if: matrix.preset == 'x64-linux-debug'
        run: cmake --build out/build/${{ matrix.preset }} --target coverage

      - name: Upload coverage report
        if: matrix.preset == 'x64-linux-debug'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
