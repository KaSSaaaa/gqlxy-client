name: Publish to vcpkg

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string
      sha512:
        description: "SHA512 of the release tarball (leave empty to auto-compute)"
        required: false
        type: string

jobs:
  publish:
    name: Prepare and submit vcpkg port
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PORT_NAME: gqlxy-client
      VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA512
        id: sha512
        run: |
          if [ -n "${{ inputs.sha512 }}" ]; then
            echo "value=${{ inputs.sha512 }}" >> "$GITHUB_OUTPUT"
          else
            SOURCE_REPO=$(grep -oP '(?<=REPO )\S+' "ports/${PORT_NAME}/portfile.cmake")
            TARBALL_URL="https://github.com/${SOURCE_REPO}/archive/refs/tags/v${VERSION}.tar.gz"
            echo "Downloading tarball from ${TARBALL_URL}"
            curl -fsSL "${TARBALL_URL}" -o /tmp/release.tar.gz
            echo "value=$(sha512sum /tmp/release.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Update portfile SHA512
        run: |
          sed -i -E "s|SHA512 [0-9a-fA-F]+.*$|SHA512 ${{ steps.sha512.outputs.value }}|" \
            "ports/${PORT_NAME}/portfile.cmake"
          grep SHA512 "ports/${PORT_NAME}/portfile.cmake"

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg --depth=1
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=/tmp/vcpkg" >> "$GITHUB_ENV"
          echo "/tmp/vcpkg" >> "$GITHUB_PATH"

      - name: Validate port
        run: |
          vcpkg install "${PORT_NAME}" \
            --overlay-ports="${GITHUB_WORKSPACE}/ports" \
            --triplet=x64-linux \
            --no-binarycaching

      - name: Fork microsoft/vcpkg
        env:
          GH_TOKEN: ${{ secrets.VCPKG_PAT }}
        run: gh repo fork microsoft/vcpkg --default-branch-only

      - name: Prepare branch and version files
        env:
          GH_TOKEN: ${{ secrets.VCPKG_PAT }}
        run: |
          BRANCH="add-${PORT_NAME}-${VERSION}"

          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.actor }}/vcpkg.git" \
            /tmp/vcpkg-fork --depth=1
          cd /tmp/vcpkg-fork

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"

          cp -r "${GITHUB_WORKSPACE}/ports/${PORT_NAME}" "ports/${PORT_NAME}"

          git add "ports/${PORT_NAME}"
          git commit -m "[${PORT_NAME}] Add version ${VERSION}"

          GIT_TREE=$(git rev-parse "HEAD:ports/${PORT_NAME}")

          mkdir -p "versions/g-"
          jq -n \
            --arg version "${VERSION}" \
            --arg tree "${GIT_TREE}" \
            '{"versions": [{"version": $version, "git-tree": $tree}]}' \
            > "versions/g-/${PORT_NAME}.json"

          jq \
            --arg port "${PORT_NAME}" \
            --arg ver "${VERSION}" \
            '.default[$port] = {"baseline": $ver, "port-version": 0}
             | .default |= (to_entries | sort_by(.key) | from_entries)' \
            versions/baseline.json > /tmp/baseline.json
          mv /tmp/baseline.json versions/baseline.json

          git add versions/
          git commit --amend --no-edit
          git push origin "${BRANCH}"

      - name: Create PR to microsoft/vcpkg
        env:
          GH_TOKEN: ${{ secrets.VCPKG_PAT }}
        run: |
          BRANCH="add-${PORT_NAME}-${VERSION}"
          gh pr create \
            --repo microsoft/vcpkg \
            --title "[${PORT_NAME}] Add version ${VERSION}" \
            --body "$(printf '%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n---\n_%s_' \
              "Adding new port \`${PORT_NAME}\` ${VERSION}." \
              "**Description:** A C++ GraphQL client with HTTP/WS/SSE transport, RxCpp reactivity, and C++20 coroutines." \
              "**Homepage:** https://github.com/${{ github.repository }}" \
              "**License:** MIT" \
              "**Dependencies:** \`rxcpp\`, \`nlohmann-json\`, \`boost-beast\`, \`openssl\`" \
              "Generated by the [vcpkg-publish workflow](https://github.com/${{ github.repository }}/actions/workflows/vcpkg-publish.yml).")" \
            --head "${{ github.actor }}:${BRANCH}"
